# ---------------------------------------------------------------------------
# Mail Aggregator — Deploy (SSH + docker compose pull/up)
#
# Trigger: push to main (after CI is green) OR manual workflow_dispatch
# (so you can re-deploy a known-good sha without pushing a new commit).
#
# Sequence:
#   1. Wait for the CI workflow to finish on this same sha.
#   2. SSH into $DEPLOY_HOST as $DEPLOY_USER (key in $DEPLOY_KEY).
#   3. On the server: git pull, write IMAGE_TAG=<sha> into .env, pull GHCR
#      images, recreate api/worker (and nginx/certbot if --profile prod
#      is up), then assert healthchecks.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST  — public IP / DNS name
#   DEPLOY_USER  — ssh login user (must be in the docker group on the host)
#   DEPLOY_KEY   — full PEM of the private SSH key (matching the public key
#                  added to ~$DEPLOY_USER/.ssh/authorized_keys)
#   DEPLOY_PATH  — absolute path to the checkout on the server (e.g.
#                  /opt/mail-aggregator)
#
# The host must already be bootstrapped per docs/SERVER-SETUP.md (Docker
# installed, repo cloned to $DEPLOY_PATH, .env populated, GHCR `docker login`
# done so `docker compose pull` can read private images).
# ---------------------------------------------------------------------------

name: Deploy

# Trigger from CI workflow completion (more reliable than polling for jobs
# that may not exist yet), or manually via workflow_dispatch.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "Image SHA to deploy (defaults to current ref's sha)"
        required: false
        type: string

# Never deploy two different shas in parallel — they'd race on the server.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:

  deploy:
    name: SSH deploy to ${{ vars.DEPLOY_ENV || 'prod' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run only when CI passed (workflow_run path) or on manual dispatch.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    environment:
      # GitHub Environments give per-env approval gates if you want them
      # later (Settings → Environments → prod → Required reviewers).
      name: prod
    steps:
      - name: Resolve deploy sha
        id: sha
        run: |
          input_sha="${{ github.event.inputs.sha }}"
          if [ -n "$input_sha" ]; then
            echo "sha=$input_sha" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute repo lower-case
        id: repo
        run: |
          repo_lc="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          echo "lc=ghcr.io/${repo_lc}" >> "$GITHUB_OUTPUT"

      # The private key is stored base64-encoded in DEPLOY_KEY_B64. This is
      # the most reliable way to ship a PEM through GitHub's Secret UI:
      # base64 is a single line with no newlines/whitespace to mangle, and
      # `base64 -d` always reproduces the original bytes exactly.
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Fail fast with a clear message if the secret is invalid.
          ssh-keygen -lf ~/.ssh/deploy_key

      - name: Trust the deploy host
        run: |
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Diagnose SSH (verbose, no script)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          # IdentitiesOnly=yes prevents ssh from trying any default keys
          # (e.g. id_rsa) before our deploy_key, which can trip sshd's
          # MaxAuthTries=3 limit.
          ssh -v -o IdentitiesOnly=yes -i ~/.ssh/deploy_key \
            "$DEPLOY_USER@$DEPLOY_HOST" "echo SSH_OK"

      - name: Deploy over SSH
        env:
          SHA: ${{ steps.sha.outputs.sha }}
          IMAGE_REGISTRY: ${{ steps.repo.outputs.lc }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          # ServerAliveInterval/CountMax keep the control connection alive
          # across the long `pull` + `migrations` steps so a quiet TCP idle
          # period can't drop the session before `up` runs.
          #
          # `bash -s` reads the script from stdin (the heredoc). The script
          # itself runs each `docker compose ...` line; we force every compose
          # invocation that could attach to a terminal to use `-T`
          # (no TTY, do not read this stdin) so it can NOT drain the rest of
          # the heredoc — see the long comment on the migrations step below.
          ssh -o IdentitiesOnly=yes \
              -o ServerAliveInterval=30 -o ServerAliveCountMax=10 \
              -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            SHA="$SHA" IMAGE_REGISTRY="$IMAGE_REGISTRY" DEPLOY_PATH="$DEPLOY_PATH" \
            bash -s <<'REMOTE_SCRIPT'
          set -euo pipefail
          # set -x: print every command to the deploy log so that, if a step
          # ever aborts again, the GitHub Actions log shows exactly where —
          # cheap and invaluable for an opaque one-shot SSH deploy.
          set -x
          cd "$DEPLOY_PATH"

          echo "==> deploying $SHA from $IMAGE_REGISTRY"

          # Pin the version in .env so subsequent `docker compose ps`,
          # `restart`, etc. on the host use the same images. We rewrite
          # only the IMAGE_TAG / IMAGE_REGISTRY lines — leave the rest
          # of .env (passwords, encryption keys) untouched.
          git fetch --depth=1 origin main
          git -c advice.detachedHead=false checkout "$SHA"

          # In-place edit of .env: replace IMAGE_TAG=... and IMAGE_REGISTRY=...
          # If a key is missing (older .env), append it.
          for kv in "IMAGE_TAG=$SHA" "IMAGE_REGISTRY=$IMAGE_REGISTRY"; do
            key="${kv%%=*}"
            if grep -q "^${key}=" .env; then
              sed -i "s|^${key}=.*|${kv}|" .env
            else
              echo "$kv" >> .env
            fi
          done

          # Pull the new images. `--profile prod` is required so nginx /
          # certbot are included if they're already running on this host.
          docker compose --profile prod pull api worker

          # Run DB migrations EXPLICITLY before bringing up api/worker.
          #
          # Why an explicit step (not just depends_on): on a `up -d` that does
          # NOT recreate the postgres dependency, compose may take a no-recreate
          # path where the mas-migrations init-container's
          # `service_completed_successfully` dependency is not re-triggered — so
          # the new api/worker code could start against an un-migrated schema.
          # `run --rm mas-migrations` removes that latent gap: migrations always
          # run, on a fresh one-shot container, before the new code boots.
          #
          # Fault-tolerant: REMOTE_SCRIPT runs under `set -euo pipefail`, so a
          # non-zero alembic exit aborts the whole deploy (no silent skip,
          # api/worker stay on the previous version). Idempotent: `alembic
          # upgrade head` is a no-op when the DB is already at head.
          # mas-migrations has no `profiles:` key → it is in the default profile
          # and is therefore selectable under `--profile prod run`.
          #
          # ROOT CAUSE of the "containers stay on the old image" bug:
          # `docker compose run` (unlike `up`) is an interactive command — by
          # default it allocates a TTY and ATTACHES TO STDIN. Here the remote
          # shell is `bash -s`, whose stdin IS the heredoc carrying the rest of
          # this script. When execution reached this line, `compose run`
          # inherited that stdin and DRAINED it — swallowing every line below
          # (the `up --force-recreate`, nginx recreate, healthcheck) as if it
          # were keyboard input to the migration container. alembic still ran
          # and exited 0, bash then hit EOF and exited 0 → the job went green,
          # but api/worker were never recreated. That is exactly the observed
          # symptom (git/.env/image updated, migrations applied, containers on
          # the old image, no failure).
          #
          # Fix: `-T` disables TTY allocation AND stdin attach, and we also
          # explicitly redirect stdin from /dev/null so this command can never
          # consume the heredoc. Belt-and-braces; either alone is sufficient.
          docker compose --profile prod run --rm -T mas-migrations < /dev/null

          # Recreate exactly the services that ship our code (now that the
          # schema is at head — new code never starts on an old schema).
          # --force-recreate is mandatory: when the image is pulled under the
          # same tag, or when ONLY .env (env_file) changed, compose considers
          # the running container "up to date" and silently skips it. That
          # caused a prod incident where new code + new OUTLOOK_* env vars did
          # NOT apply (containers stayed on the previous image/.env until a
          # manual `up -d --force-recreate`). Forcing recreation guarantees
          # both the new image AND the refreshed .env are picked up. The blip
          # is the same few seconds as any deploy; mas-migrations above is a
          # one-shot `run --rm` and is unaffected; this stays idempotent.
          docker compose --profile prod up -d --remove-orphans --force-recreate api worker

          # Recreate nginx AFTER api/worker so two things happen, fixing the
          # recurring "502 Bad Gateway after deploy" for good:
          #   1. nginx re-renders default.conf from the template at start
          #      (envsubst only runs on container start) — picking up the
          #      per-request resolver added in deploy/nginx/templates.
          #   2. nginx re-resolves the api container's brand-new IP. Without
          #      this, nginx keeps proxying to the previous (now-dead) api IP
          #      because the api container was just recreated above.
          # --force-recreate guarantees the restart even though the nginx
          # image/env didn't change (compose otherwise skips it). The blip is
          # well under a second; once the resolver-enabled config is live,
          # future api recreations no longer need this — but we keep it as a
          # belt-and-braces step that is cheap and idempotent.
          docker compose --profile prod up -d --force-recreate nginx

          # Verify api/worker are ACTUALLY running the image we just deployed.
          # This closes the silent-drift gap: if `up --force-recreate` ever
          # failed to swap the image (the old bug), this turns it into a loud,
          # visible job failure in Actions instead of a green-but-stale deploy.
          # Compare each container's running image reference against the
          # expected "$IMAGE_REGISTRY/<svc>:$SHA".
          expected_api="$IMAGE_REGISTRY/api:$SHA"
          expected_worker="$IMAGE_REGISTRY/worker:$SHA"
          running_api="$(docker inspect --format='{{.Config.Image}}' mas-api)"
          running_worker="$(docker inspect --format='{{.Config.Image}}' mas-worker)"
          echo "==> api    expected=$expected_api running=$running_api"
          echo "==> worker expected=$expected_worker running=$running_worker"
          if [ "$running_api" != "$expected_api" ] || [ "$running_worker" != "$expected_worker" ]; then
            echo "ERROR: containers are NOT on the deployed image ($SHA). up --force-recreate did not apply." >&2
            docker compose ps
            exit 1
          fi

          # Smoke-test: poll healthcheck for up to 90s.
          attempts=18
          until docker inspect --format='{{.State.Health.Status}}' mas-api 2>/dev/null | grep -q healthy; do
            attempts=$((attempts - 1))
            if [ $attempts -le 0 ]; then
              echo "api never became healthy; recent logs:"
              docker logs --tail 80 mas-api || true
              exit 1
            fi
            sleep 5
          done

          docker compose ps
          echo "==> deploy of $SHA complete"
          REMOTE_SCRIPT
