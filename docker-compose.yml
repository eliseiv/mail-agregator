# ---------------------------------------------------------------------------
# Mail Aggregator — docker-compose stack
#
# Source of truth: docs/07-deployment.md (services, env, healthchecks,
# bootstrap order).
#
# Layout:
#   - api       : FastAPI (HTTP, internal :8080, fronted by nginx in prod)
#   - worker    : APScheduler sync_cycle + cleanup
#   - postgres  : metadata + audit
#   - redis     : sessions, rate-limit, force_sync flags
#   - nginx     : TLS + reverse proxy (only in prod profile, see profiles)
#   TLS/certs   : handled at HOST level — host `certbot` + systemd `certbot.timer`
#                 (webroot /var/www/certbot), certs in host /etc/letsencrypt
#                 bind-mounted RO into nginx. There is NO certbot service here
#                 and NO mas_certbot_* volumes (see ADR-0032 / docs/07-deployment.md §6).
#
# All services live on a single user-defined bridge network so DNS resolves
# by service name (postgres / redis / api). No host-port mapping
# for postgres/redis — only nginx publishes 80/443.
#
# Local dev:  docker compose up -d
# Prod:       docker compose --profile prod up -d
# ---------------------------------------------------------------------------

name: mail-aggregator

# ---------------------------------------------------------------------------
# Reusable healthcheck/restart fragments (YAML anchors)
# ---------------------------------------------------------------------------
x-restart-default: &restart_default
  restart: unless-stopped

x-logging-default: &logging_default
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:

  # -------------------------------------------------------------------------
  # PostgreSQL 16 — metadata + audit log
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: mas-postgres
    <<: [*restart_default, *logging_default]
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-mas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB:       ${POSTGRES_DB:-mail_aggregator}
      # Reject connections from outside the docker network even if a
      # misconfiguration would expose the port.
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - mas_pg_data:/var/lib/postgresql/data
    networks:
      - mas-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-mas} -d $${POSTGRES_DB:-mail_aggregator}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Hardening: read-only rootfs is not viable for postgres (writes to
    # /var/run/postgresql). Drop all caps and add back only what initdb
    # needs: CHOWN/SETUID/SETGID/DAC_READ_SEARCH/FOWNER.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_READ_SEARCH
      - FOWNER

  # -------------------------------------------------------------------------
  # Redis 7.2 — sessions, rate-limit, force_sync flags
  # -------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: mas-redis
    <<: [*restart_default, *logging_default]
    # AOF off by default — sessions are recoverable by re-login (TD says
    # losing redis is acceptable). Enable with REDIS_APPENDONLY=yes if needed.
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "${REDIS_APPENDONLY:-no}"
      - --maxmemory-policy
      - allkeys-lru
      - --maxmemory
      - "256mb"
    volumes:
      - mas_redis_data:/data
    networks:
      - mas-net
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    # Alpine redis init script setpriv-drops to the redis user — needs SETUID/SETGID.
    # Other caps are needed by docker-entrypoint for chown/chmod of /data.
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - CHOWN
      - FOWNER

  # -------------------------------------------------------------------------
  # Migrations — one-shot init container. Runs `alembic upgrade head` and
  # exits. Both api and worker depend on its successful completion, so
  # neither boots against a schema-less database (race-free).
  #
  # Backend keeps `alembic` available as a CLI inside the api image; this
  # container just invokes it. seed_super_admin remains a startup hook in
  # api — by then tables exist.
  # -------------------------------------------------------------------------
  mas-migrations:
    # IMAGE_REGISTRY is empty for local builds (resolves to "mail-aggregator/api:..."),
    # set to e.g. ghcr.io/<owner>/<repo> on the prod host so `docker compose pull`
    # fetches the CI-published image instead of rebuilding locally.
    image: ${IMAGE_REGISTRY:-mail-aggregator}/api:${IMAGE_TAG:-local}
    container_name: mas-migrations
    build:
      context: .
      dockerfile: deploy/Dockerfile
      target: api
      args:
        PYTHON_VERSION: "3.12"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://mas:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mail_aggregator}}
    command: ["alembic", "upgrade", "head"]
    networks:
      - mas-net
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    <<: *logging_default

  # -------------------------------------------------------------------------
  # API — FastAPI behind gunicorn+uvicorn workers
  # -------------------------------------------------------------------------
  api:
    # IMAGE_REGISTRY is empty for local builds (resolves to "mail-aggregator/api:..."),
    # set to e.g. ghcr.io/<owner>/<repo> on the prod host so `docker compose pull`
    # fetches the CI-published image instead of rebuilding locally.
    image: ${IMAGE_REGISTRY:-mail-aggregator}/api:${IMAGE_TAG:-local}
    container_name: mas-api
    <<: [*restart_default, *logging_default]
    build:
      context: .
      dockerfile: deploy/Dockerfile
      target: api
      args:
        PYTHON_VERSION: "3.12"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mas-migrations:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      # Override / pin a few values that must NEVER come from .env ambiguity.
      DATABASE_URL:    ${DATABASE_URL:-postgresql+asyncpg://mas:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mail_aggregator}}
      REDIS_URL:       ${REDIS_URL:-redis://redis:6379/0}
    networks:
      - mas-net
    # Per docs/07-deployment.md sec.5: try read-only rootfs.
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      core: 0   # never write core dumps (mail master key would leak)
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request, sys
          r = urllib.request.urlopen("http://localhost:8080/healthz", timeout=3)
          sys.exit(0 if r.status == 200 else 1)
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # -------------------------------------------------------------------------
  # Worker — APScheduler sync_cycle + cleanup
  # -------------------------------------------------------------------------
  worker:
    image: ${IMAGE_REGISTRY:-mail-aggregator}/worker:${IMAGE_TAG:-local}
    container_name: mas-worker
    <<: [*restart_default, *logging_default]
    build:
      context: .
      dockerfile: deploy/Dockerfile
      target: worker
      args:
        PYTHON_VERSION: "3.12"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Worker waits for mas-migrations to finish so the schema is in
      # place before any DB calls. No coupling to api lifecycle — worker
      # can start in parallel with api once migrations are done.
      mas-migrations:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL:    ${DATABASE_URL:-postgresql+asyncpg://mas:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mail_aggregator}}
      REDIS_URL:       ${REDIS_URL:-redis://redis:6379/0}
    networks:
      - mas-net
    read_only: true
    tmpfs:
      # Worker writes /tmp/worker_alive for healthcheck.
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      core: 0
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import time, os, sys
          m = os.stat("/tmp/worker_alive").st_mtime
          sys.exit(0 if (time.time() - m) < 360 else 1)
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  # -------------------------------------------------------------------------
  # Nginx — TLS termination + reverse proxy. Prod-only (profile: prod).
  # In dev, hit api directly via docker-compose.override.yml (publishes
  # 127.0.0.1:8080) — nginx is never started.
  #
  # First-run requires a TLS cert: bring up the rest of the stack first,
  # obtain the cert with the HOST certbot (webroot/standalone, Part B of
  # docs/SERVER-SETUP.md) into host /etc/letsencrypt, then
  # `docker compose --profile prod up -d nginx`. Renewal is the host
  # `certbot.timer`; there is no certbot container (ADR-0032).
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: mas-nginx
    <<: [*restart_default, *logging_default]
    profiles: ["prod"]
    depends_on:
      api:
        condition: service_healthy
    environment:
      # Substituted into /etc/nginx/templates/*.template at startup.
      SERVER_DOMAIN: ${SERVER_DOMAIN:?SERVER_DOMAIN must be set in prod profile}
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/templates:/etc/nginx/templates:ro
      # Host-installed certbot writes certs to /etc/letsencrypt and serves
      # ACME http-01 challenges from /var/www/certbot during webroot-renewal.
      # nginx reads both via bind mounts. systemd-timer on the host
      # handles renewal — no in-cluster certbot container needed.
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - mas-net
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # Loopback HTTP probe — listens on the same :80 server block where
      # /_health_nginx returns 200. Intentionally HTTP (not HTTPS) so the
      # check works even if the TLS cert is missing/expired.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/_health_nginx"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

# ---------------------------------------------------------------------------
# Volumes — all named, all on default driver. Backup policy in
# docs/07-deployment.md sec.8.
# ---------------------------------------------------------------------------
volumes:
  mas_pg_data:
    name: mas_pg_data
  mas_redis_data:
    name: mas_redis_data

# ---------------------------------------------------------------------------
# Network — single user-defined bridge. Service-to-service traffic stays
# inside this network; only nginx publishes ports to the host (80/443).
# ---------------------------------------------------------------------------
networks:
  mas-net:
    name: mas-net
    driver: bridge
