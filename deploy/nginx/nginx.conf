# ---------------------------------------------------------------------------
# Mail Aggregator — Nginx main config (prod profile).
#
# Mounted at /etc/nginx/nginx.conf (read-only) inside the nginx:1.27-alpine
# container. The per-host server blocks live in /etc/nginx/conf.d/*.conf,
# which the alpine image generates at startup from /etc/nginx/templates/*.template
# via envsubst (substituting ${SERVER_DOMAIN} from the container env).
#
# Source of truth: docs/07-deployment.md sec.6.
# ---------------------------------------------------------------------------

user                 nginx;
worker_processes     auto;
worker_rlimit_nofile 4096;

# stdout/stderr — let docker collect via json-file driver. error_log writes
# to a real path during early bootstrap (before logs are redirected); using
# /var/log/nginx/error.log is the alpine default and is symlinked to stderr.
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept       on;
    use                epoll;
}

http {
    # MIME ----------------------------------------------------------------
    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    # Logging -------------------------------------------------------------
    # combined-style + upstream timing/status — easier to debug 502s.
    log_format mas_combined
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        'rt=$request_time uct="$upstream_connect_time" '
        'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log mas_combined;

    # Performance ---------------------------------------------------------
    sendfile          on;
    tcp_nopush        on;
    tcp_nodelay       on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Strip the proxy version (defence-in-depth). The app already sets
    # security headers; we don't advertise nginx version on top of that.
    server_tokens     off;

    # Limits --------------------------------------------------------------
    # 8 MiB — sized to the largest body the LIVE schemas accept, not to
    # attachments: only external_router + health_router sit behind this proxy
    # (backend/app/main.py) and the connector accepts no uploads at all (every
    # endpoint parses a JSON body). Worst case is ExternalSendRequest.body_text
    # (backend/app/external/schemas.py) — max_length is 1 MiB of CODE POINTS,
    # not bytes (Pydantic counts len()). 8m is normed on the REALISTIC worst
    # case: BMP text in any live language (e.g. Cyrillic), JSON-escape 6 B per
    # code point = 6 MiB, plus the remaining fields (refs/subject/in_reply_to
    # and realistic to/cc) ~0.5 MiB => ~6.4 MiB < 8m — while cutting the DoS
    # surface fourfold against the previous 30m. Bodies above 8m are cut off
    # BY DESIGN: that is the direct purpose of client_max_body_size, not a
    # weakness of it (same class as to/cc having no per-item bound, TD-061).
    # Source of truth: docs/07-deployment.md sec.6. On any max_length change to
    # body_text (or a new binary field), recompute and update BOTH points. The
    # formula 6 * max_length(body_text) + 1 MiB is EXPLICITLY a BMP estimate,
    # NOT the schema's formal ceiling: the 6 B multiplier holds only for BMP,
    # while astral code points (U+10000+, emoji) cost 12 B each — json.dumps
    # emits a SURROGATE PAIR (two \uXXXX) for one code point — so the formal
    # ceiling is 12 * max_length + 1 MiB = 12 MiB. Do not apply the formula
    # blindly; decide which case is normed first:
    #   - keep the BMP estimate (current choice) => all-astral bodies get 413,
    #     accepted by design (a million emoji in a row is not valid mail);
    #   - to pass astral too => compute with 12 * and DOUBLE the limit, having
    #     weighed the DoS surface handed back.
    client_max_body_size  8m;
    client_body_timeout   30s;
    client_header_timeout 10s;
    send_timeout          30s;

    # Gzip ----------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   5;
    # Note: text/html is gzipped by default and must NOT appear here
    # (nginx warns about duplicate MIME type otherwise).
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # SSL global defaults (per-server cert paths still required) ----------
    ssl_protocols          TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers            ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout    1d;
    ssl_session_cache      shared:MASssl:10m;
    ssl_session_tickets    off;

    # Per-host server blocks. Generated by envsubst from
    # /etc/nginx/templates/*.template at container start.
    include /etc/nginx/conf.d/*.conf;
}
