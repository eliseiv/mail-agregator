# ---------------------------------------------------------------------------
# Mail Aggregator — Nginx main config (prod profile).
#
# Mounted at /etc/nginx/nginx.conf (read-only) inside the nginx:1.27-alpine
# container. The per-host server blocks live in /etc/nginx/conf.d/*.conf,
# which the alpine image generates at startup from /etc/nginx/templates/*.template
# via envsubst (substituting ${SERVER_DOMAIN} from the container env).
#
# Source of truth: docs/07-deployment.md sec.6.
# ---------------------------------------------------------------------------

user                 nginx;
worker_processes     auto;
worker_rlimit_nofile 4096;

# stdout/stderr — let docker collect via json-file driver. error_log writes
# to a real path during early bootstrap (before logs are redirected); using
# /var/log/nginx/error.log is the alpine default and is symlinked to stderr.
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept       on;
    use                epoll;
}

http {
    # MIME ----------------------------------------------------------------
    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    # Logging -------------------------------------------------------------
    # combined-style + upstream timing/status — easier to debug 502s.
    log_format mas_combined
        '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" '
        'rt=$request_time uct="$upstream_connect_time" '
        'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log mas_combined;

    # Performance ---------------------------------------------------------
    sendfile          on;
    tcp_nopush        on;
    tcp_nodelay       on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Strip the proxy version (defence-in-depth). The app already sets
    # security headers; we don't advertise nginx version on top of that.
    server_tokens     off;

    # Limits --------------------------------------------------------------
    # 30 MiB matches MAX_ATTACHMENT_BYTES (25 MiB) + MIME overhead.
    client_max_body_size  30m;
    client_body_timeout   30s;
    client_header_timeout 10s;
    send_timeout          30s;

    # Gzip ----------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   5;
    # Note: text/html is gzipped by default and must NOT appear here
    # (nginx warns about duplicate MIME type otherwise).
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # SSL global defaults (per-server cert paths still required) ----------
    ssl_protocols          TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers            ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout    1d;
    ssl_session_cache      shared:MASssl:10m;
    ssl_session_tickets    off;

    # Per-host server blocks. Generated by envsubst from
    # /etc/nginx/templates/*.template at container start.
    include /etc/nginx/conf.d/*.conf;
}
