# Alembic config — see https://alembic.sqlalchemy.org/en/latest/tutorial.html
#
# Database URL is sourced from the application Settings (env var
# DATABASE_URL); env.py overrides ``sqlalchemy.url`` programmatically so this
# file does NOT contain the URL.
#
# Migrations live in ``migrations/versions``.

[alembic]
script_location = migrations
prepend_sys_path = .
sqlalchemy.url =
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
timezone = UTC
truncate_slug_length = 40
revision_environment = false
sourceless = false
version_locations =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
